name: Update profile metrics

on:
  schedule:
    - cron: "9 13 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-readme-writes
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate core GitHub metrics (terminal skin)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: IdkwhatImD0ing
          template: terminal
          filename: assets/github-metrics.svg
          committer_branch: main
          committer_message: "metrics: dashboards repainted [skip actions]"
          base: header, activity, community, repositories, metadata
          config_display: large
          config_timezone: America/Los_Angeles
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_ignored: html, css
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Generate GitHub skyline
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          user: IdkwhatImD0ing
          filename: assets/github-skyline.svg
          committer_branch: main
          committer_message: "metrics: skyline re-surveyed [skip actions]"
          base: ""
          config_display: large
          plugin_skyline: yes
          plugin_skyline_frames: 60
          plugin_skyline_quality: 0.6
          plugin_skyline_settings: |
            {
              "url": "https://honzaap.github.io/GithubCity?name=${login}&year=${year}",
              "ready": "[...document.querySelectorAll('.display-info span')].map(span => span.innerText).includes('${login}')",
              "wait": 4,
              "hide": ".github-corner, .footer-link, .buttons-options, .mobile-rotate, .display-info span:first-child"
            }
