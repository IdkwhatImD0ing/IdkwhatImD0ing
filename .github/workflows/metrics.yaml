name: Update profile metrics

on:
  schedule:
    - cron: "9 13 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-readme-writes
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate core GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: IdkwhatImD0ing
          filename: assets/github-metrics.svg
          committer_branch: main
          base: header, activity, community, repositories, metadata
          config_timezone: America/Los_Angeles
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_ignored: html, css
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_visibility: public

      - name: Generate GitHub skyline
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          user: IdkwhatImD0ing
          filename: assets/github-skyline.svg
          committer_branch: main
          base: ""
          plugin_skyline: yes
          plugin_skyline_frames: 60
          plugin_skyline_quality: 0.6
          plugin_skyline_settings: |
            {
              "url": "https://honzaap.github.io/GithubCity?name=${login}&year=${year}",
              "ready": "[...document.querySelectorAll('.display-info span')].map(span => span.innerText).includes('${login}')",
              "wait": 4,
              "hide": ".github-corner, .footer-link, .buttons-options, .mobile-rotate, .display-info span:first-child"
            }

      - name: Generate coding habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: IdkwhatImD0ing
          filename: assets/github-habits.svg
          committer_branch: main
          base: ""
          config_timezone: America/Los_Angeles
          plugin_habits: yes
          plugin_habits_from: 300
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 8

      - name: Generate related people
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: IdkwhatImD0ing
          filename: assets/github-people.svg
          committer_branch: main
          base: ""
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 32
          plugin_people_types: followers, following

      - name: Generate Hackathon Playbook RSS
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          user: IdkwhatImD0ing
          filename: assets/playbook-rss.svg
          committer_branch: main
          base: ""
          plugin_rss: yes
          plugin_rss_source: https://www.thehackathonplaybook.dev/blog/rss.xml
          plugin_rss_limit: 4
