name: Update terminal hero

on:
  schedule:
    - cron: "41 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-readme-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generators
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          python -m pip install github-readme-terminal pillow

      - name: Generate terminal hero (boot program of the week)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/generate_terminal_hero.py

      - name: Regenerate neofetch card
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/generate_neofetch.py

      - name: Regenerate ANSI business card
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/generate_ansi_card.py

      - name: Rebase generated changes on latest main
        run: git pull --rebase --autostash origin main

      - name: Commit boot assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "boot: re-rendered POST sequence, refreshed peripherals"
          file_pattern: "assets/terminal-hero.gif assets/neofetch.svg bill.ansi"
