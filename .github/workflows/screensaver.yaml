name: Rotate screensaver predator

on:
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-readme-writes
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/snake.svg?palette=github-dark

      - name: Generate pacman
        uses: abozanona/pacman-contribution-graph@v5.0.0
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Normalize svg names
        run: |
          ls -la dist/ || true
          if [ -f dist/pacman-contribution-graph-dark.svg ]; then
            cp dist/pacman-contribution-graph-dark.svg dist/pacman.svg
          elif [ -f dist/pacman-contribution-graph.svg ]; then
            cp dist/pacman-contribution-graph.svg dist/pacman.svg
          else
            found=$(find . -maxdepth 2 -name "*pacman*.svg" | head -1)
            if [ -n "$found" ]; then mkdir -p dist && cp "$found" dist/pacman.svg; fi
          fi
          ls -la dist/

      - name: Push screensavers to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Point README at this week's predator
        run: python scripts/update_screensaver.py

      - name: Rebase generated changes on latest main
        run: git pull --rebase --autostash origin main

      - name: Commit screensaver rotation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "screensaver: predator rotated on schedule"
          file_pattern: README.md
