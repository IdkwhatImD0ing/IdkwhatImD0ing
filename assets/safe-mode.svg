<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700" role="img" aria-label="ART3M1S BIOS in SAFE MODE: degraded video environment detected — light mode">
  <style>
    .t { font-family: "Cascadia Code", "Fira Code", Consolas, "Courier New", monospace; font-size: 17px; fill: #ffb000; }
    .dim { fill: #8a5c00; }
    .warn { fill: #ff8c00; font-weight: bold; }
    .inv { fill: #100a00; font-weight: bold; }
    .line { opacity: 0; animation: reveal 0.01s linear forwards; }
    @keyframes reveal { to { opacity: 1; } }
    .l1  { animation-delay: 0.3s; }  .l2  { animation-delay: 0.6s; }
    .l3  { animation-delay: 1.4s; }  .l4  { animation-delay: 1.9s; }
    .l5  { animation-delay: 2.4s; }  .l6  { animation-delay: 3.2s; }
    .l7  { animation-delay: 4.0s; }  .l8  { animation-delay: 4.8s; }
    .l9  { animation-delay: 5.2s; }  .l10 { animation-delay: 5.6s; }
    .l11 { animation-delay: 6.0s; }  .l12 { animation-delay: 6.9s; }
    .l13 { animation-delay: 7.6s; }
    .cursor { animation: blink 1.1s steps(1) infinite 7.6s; opacity: 0; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .crt { animation: flicker 4s linear infinite; }
    @keyframes flicker { 0% { opacity: 1; } 97% { opacity: 1; } 98% { opacity: 0.93; } 99% { opacity: 1; } 100% { opacity: 1; } }
  </style>
  <rect width="900" height="700" fill="#100a00"/>
  <rect x="6" y="6" width="888" height="688" fill="none" stroke="#3a2800" stroke-width="2"/>
  <g class="crt">
    <text class="t line l1" x="30" y="52">ART3M1S Modular BIOS v2.8.04 &#8212; <tspan class="warn">SAFE MODE</tspan></text>
    <text class="t line l2" x="30" y="80">Copyright (C) 2026, Bill Zhang Labs</text>
    <text class="t line l3 warn" x="30" y="136">!! degraded video environment detected: LIGHT MODE</text>
    <text class="t line l4 warn" x="30" y="164">!! phosphor integrity: compromised</text>
    <text class="t line l5 warn" x="30" y="192">!! ambiance: 12% and falling</text>
    <text class="t line l6" x="30" y="248">Memory Test: <tspan class="dim">skipped (why bother)</tspan></text>
    <text class="t line l7" x="30" y="276">Peripherals: <tspan class="dim">sunglasses not detected</tspan></text>
    <text class="t line l8" x="30" y="332">Boot menu:</text>
    <text class="t line l9" x="30" y="364">  [1] continue in light mode <tspan class="dim">(bold choice, respect)</tspan></text>
    <g class="line l10">
      <rect x="48" y="382" width="586" height="26" fill="#ffb000"/>
      <text class="t inv" x="52" y="401">[2] switch to dark mode and reboot for the full experience</text>
    </g>
    <text class="t line l11" x="30" y="428">  [3] pretend this never happened</text>
    <text class="t line l12 dim" x="30" y="484">hint: the real BIOS only POSTs in the dark.</text>
    <text class="t line l13" x="30" y="540">awaiting operator input</text>
    <rect class="cursor" x="298" y="526" width="11" height="18" fill="#ffb000"/>
    <text class="t dim" x="30" y="676" font-size="13">SAFE MODE renders no GIFs. It is making a point.</text>
  </g>
  <g opacity="0.05" pointer-events="none">
    <rect y="0" width="900" height="2" fill="#ffffff"><animate attributeName="y" from="0" to="700" dur="7s" repeatCount="indefinite"/></rect>
  </g>
</svg>
