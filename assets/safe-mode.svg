<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" aria-label="ART3M1S BIOS in SAFE MODE: degraded video environment detected — light mode" role="img" viewBox="0 0 900 700"><style>@keyframes blink{0%,49%{opacity:1}50%{opacity:0}}@keyframes flicker{0%,97%,99%{opacity:1}98%{opacity:.93}}.t{font-family:&quot;Cascadia Code&quot;,&quot;Fira Code&quot;,Consolas,&quot;Courier New&quot;,monospace;font-size:17px;fill:#ffb000}.dim{fill:#8a5c00}.inv,.warn{font-weight:700}.warn{fill:#ff8c00}.inv{fill:#100a00}.line{opacity:0;animation:reveal .01s linear forwards}.l1{animation-delay:.3s}.l2{animation-delay:.6s}.l3{animation-delay:1.4s}.l4{animation-delay:1.9s}.l5{animation-delay:2.4s}.l6{animation-delay:3.2s}.l7{animation-delay:4s}.l8{animation-delay:4.8s}.l9{animation-delay:5.2s}.l10{animation-delay:5.6s}.l11{animation-delay:6s}.l12{animation-delay:6.9s}.l13{animation-delay:7.6s}.cursor{animation:blink 1.1s steps(1) infinite 7.6s;opacity:0}.crt{animation:flicker 4s linear infinite}</style><rect width="900" height="700" fill="#100a00"/><rect width="888" height="688" x="6" y="6" fill="none" stroke="#3a2800" stroke-width="2"/><g class="crt"><text x="30" y="52" class="t line l1">ART3M1S Modular BIOS v2.8.04 — <tspan class="warn">SAFE MODE</tspan></text><text x="30" y="80" class="t line l2">Copyright (C) 2026, Bill Zhang Labs</text><text x="30" y="136" class="t line l3 warn">!! degraded video environment detected: LIGHT MODE</text><text x="30" y="164" class="t line l4 warn">!! phosphor integrity: compromised</text><text x="30" y="192" class="t line l5 warn">!! ambiance: 12% and falling</text><text x="30" y="248" class="t line l6">Memory Test: <tspan class="dim">skipped (why bother)</tspan></text><text x="30" y="276" class="t line l7">Peripherals: <tspan class="dim">sunglasses not detected</tspan></text><text x="30" y="332" class="t line l8">Boot menu:</text><text x="30" y="364" class="t line l9">[1] continue in light mode <tspan class="dim">(bold choice, respect)</tspan></text><g class="line l10"><rect width="586" height="26" x="48" y="382" fill="#ffb000"/><text x="52" y="401" class="t inv">[2] switch to dark mode and reboot for the full experience</text></g><text x="30" y="428" class="t line l11">[3] pretend this never happened</text><text x="30" y="484" class="t line l12 dim">hint: the real BIOS only POSTs in the dark.</text><text x="30" y="540" class="t line l13">awaiting operator input</text><rect width="11" height="18" x="298" y="526" fill="#ffb000" class="cursor"/><text x="30" y="676" class="t dim" font-size="13">SAFE MODE renders no GIFs. It is making a point.</text></g><g opacity=".05" pointer-events="none"><rect width="900" height="2" y="0" fill="#fff"><animate attributeName="y" dur="7s" from="0" repeatCount="indefinite" to="700"/></rect></g></svg>